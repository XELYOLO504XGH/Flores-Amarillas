<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b001a;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-family: 'Times New Roman', serif;
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0b001a 0%, #1e003d 50%, #3d007a 100%);
            z-index: 0;
        }

        .moon {
            position: absolute;
            top: 60px;
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* SEMILLA INICIAL */
        #seed {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 0 20px #ffd700;
            animation: pulse 1.5s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #seed::after {
            content: 'Tap';
            font-size: 10px;
            color: #3d007a;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 10px #ffd700; }
            50% { transform: translateX(-50%) scale(1.2); box-shadow: 0 0 30px #ffd700; }
            100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 10px #ffd700; }
        }

        /* TEXTO */
        .message {
            position: absolute;
            top: 220px;
            width: 85%;
            text-align: center;
            color: #ffd700;
            font-size: 1.4rem;
            font-style: italic;
            z-index: 10;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            pointer-events: none;
        }

        .show-text {
            animation: fadeIn 3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(-10px); }
        }

        /* FLORES */
        #garden {
            position: relative;
            width: 100%;
            height: 350px;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            opacity: 0;
        }

        .stem {
            width: 2px;
            height: 0;
            background: #2d5a27;
        }

        .flower-top {
            position: relative;
            width: 20px;
            height: 20px;
            transform: scale(0);
        }

        .petal {
            position: absolute;
            background: #ffd700;
            width: 12px;
            height: 18px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform-origin: center bottom;
        }

        .center {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #634000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

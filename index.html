<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat <3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a0033 0%, #4b0082 100%);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* La Luna */
        .moon {
            position: absolute;
            top: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px 10px rgba(255, 255, 255, 0.4);
            z-index: 1;
        }

        /* El Valle de Flores */
        .valley {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh;
            background: radial-gradient(circle at 50% 100%, #800080, #4b0082);
            border-top-left-radius: 50% 20%;
            border-top-right-radius: 50% 20%;
            z-index: 2;
        }

        /* Flores moradas del fondo */
        .tiny-flower {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #9370DB;
            border-radius: 50%;
            box-shadow: 0 0 5px #BA55D3;
            animation: twinkle 3s infinite ease-in-out;
        }

        /* Ramo de Tulipanes SVG */
        .bouquet-container {
            position: relative;
            margin-top: auto;
            margin-bottom: 25vh;
            height: 250px;
            width: 150px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 3;
            animation: growthDelay 0s linear forwards; /* Evita que se vea antes de tiempo */
        }

        .tulip-svg {
            position: absolute;
            transform-origin: bottom center;
            opacity: 0;
            transform: scale(0.1); /* Empieza muy pequeño */
        }

        /* Animación para el ramo entero: crece desde la nada */
        @keyframes growth {
            0% { transform: scale(0.1); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Animación para que los pétalos del tulipán se abran */
        @keyframes petalOpen {
            0% { transform: rotate(0deg); opacity: 0; }
            100% { transform: rotate(var(--petal-rot)) translateX(var(--petal-shift)); opacity: 1; }
        }

        /* Clases para iniciar las animaciones */
        .tulip-grow-active {
            animation: growth 1.5s forwards ease-out;
        }

        .petal-open-active {
            animation: petalOpen 0.8s forwards ease-out;
        }

        /* Contenedor del Cuadro de Texto */
        #text-box {
            position: absolute;
            top: 20vh;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.15); /* Fondo semitransparente para leer bien */
            backdrop-filter: blur(5px); /* Efecto cristal borroso */
            border-radius: 15px;
            color: #ffd700; /* Texto dorado */
            font-size: 1.5em;
            text-align: center;
            opacity: 0; /* Empieza oculto */
            z-index: 4;
        }

        /* Animación para el cuadro de texto */
        @keyframes textFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .text-fade-active {
            animation: textFade 1s forwards ease-out;
        }

        /* Animación de titileo para las flores moradas */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

    </style>
</head>

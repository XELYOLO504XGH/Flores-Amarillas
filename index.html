<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat <3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #05001a 0%, #1a0033 60%, #4b0082 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* La Luna */
        .moon {
            position: absolute;
            top: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px 15px rgba(255, 255, 255, 0.4);
            z-index: 1;
        }

        /* Contenedor de Estrellas */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.7; }
        }

        /* Cuadro de Texto */
        #text-box {
            position: absolute;
            top: 20vh;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1); /* Fondo cristal semitransparente */
            backdrop-filter: blur(5px);
            border-radius: 15px;
            color: #ffd700; /* Texto dorado */
            font-family: 'Verdana', sans-serif;
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            opacity: 0; /* Empieza oculto */
            z-index: 4;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); /* Resplandor dorado */
        }

        .text-fade-active {
            animation: textFade 1s forwards ease-out;
        }

        @keyframes textFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Campo de Flores */
        .flower-field {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh; /* Ocupa el 40% inferior */
            z-index: 2;
            overflow: visible;
        }

        /* Estructura básica de la flor "normal" con CSS */
        .flower-css {
            position: absolute;
            transform-origin: bottom center;
            opacity: 0;
            animation: bloomIn 1s forwards ease-out;
        }

        @keyframes bloomIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .petal {
            position: absolute;
            background: #ffd700; /* Amarillo */
            width: 15px;
            height: 25px;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: bottom center;
            z-index: 2;
        }

        .center {
            position: absolute;
            bottom: 12px;
            left: -5px;
            width: 10px;
            height: 10px;
            background: #8b4513; /* Centro marrón */
            border-radius: 50%;
            z-index: 3;
        }

        .stem {
            position: absolute;
            bottom: -20px;
            left: -1px;
            width: 3px;
            height: 20px;
            background: #2d5a27; /* Tallo verde */
            border-radius: 2px;
            z-index: 1;
        }

        /* Posiciones de pétalos para flor normal */
        .p1 { transform: rotate(0deg); }
        .p2 { transform: rotate(72deg); }
        .p3 { transform: rotate(144deg); }
        .p4 { transform: rotate(216deg); }
        .p5 { transform: rotate(288deg); }

    </style>
</head>
<body>

    <div class="stars" id="stars-container"></div>
    <div class="moon"></div>
    
    <div id="text-box">
        para nat <#
    </div>

    <div class="flower-field" id="field"></div>

    <script>
        // --- PARTE 1: Generar Estrellas ---
        const starsContainer = document.getElementById('stars-container');
        const numStars = 60;

        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Tamaño aleatorio (1px a 3px)
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            // Posición aleatoria
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 80 + '%'; // Más estrellas arriba
            
            // Retraso de animación aleatorio para el parpadeo
            star.style.animationDelay = Math.random() * 3 + 's';
            
            starsContainer.appendChild(star);
        }

        // --- PARTE 2: Generar CIENTOS de Flores ---
        const field = document.getElementById('field');
        const textBox = document.getElementById('text-box');
        const numFlowers = 250; // ¡Aquí pones la cantidad que quieras, bro!

        for (let i = 0; i < numFlowers; i++) {
            // Crear el contenedor de la flor
            const flower = document.createElement('div');
            flower.className = 'flower-css';
            
            // Crear pétalos, centro y tallo
            for (let j = 1; j <= 5; j++) {
                const petal = document.createElement('div');
                petal.className = `petal p${j}`;
                flower.appendChild(petal);
            }
            const center = document.createElement('div');
            center.className = 'center';
            flower.appendChild(center);
            
            const stem = document.createElement('div');
            stem.className = 'stem';
            flower.appendChild(stem);

            // Posicionamiento aleatorio dentro del campo (40vh inferior)
            flower.style.left = Math.random() * 95 + '%'; // 95% para no pegarse al borde
            flower.style.bottom = Math.random() * 100 + '%'; // 100% de los 40vh

            // Retraso de animación aleatorio para que florezcan una por una
            flower.style.animationDelay = Math.random() * 4 + 's'; // Florecen durante 4 segundos

            field.appendChild(flower);
        }

        // --- PARTE 3: Mostrar el Texto ---
        // Mostrar el texto 4 segundos después de que empiecen a florecer
        setTimeout(() => {
            textBox.classList.add('text-fade-active');
        }, 4000); 

    </script>
</body>
</html>

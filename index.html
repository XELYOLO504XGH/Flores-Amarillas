
 
   <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat <3</title>
    <style>
        /* 1. FONDO Y ESCENA PRO (Se mantienen) */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b001a; /* Tu morado pro */
            font-family: 'Verdana', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. ESTRELLAS Y LUNA */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0b001a 0%, #1e003d 50%, #3d007a 100%);
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .moon {
            position: absolute;
            top: 50px;
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.3);
            z-index: 1;
        }

        /* 3. TEXTO CENTRADO Y CON BRILLO */
        #main-message {
            position: absolute;
            top: 50%; /* CENTRADO VERTICAL */
            transform: translateY(-50%);
            width: 90%;
            text-align: center;
            color: #ffd700;
            font-size: 1.8rem;
            font-style: italic;
            z-index: 10;
            opacity: 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 1), 0 0 30px rgba(255, 215, 0, 0.6);
            transition: opacity 3s, transform 3s;
            pointer-events: none;
        }

        .show-main-message {
            opacity: 1 !important;
            transform: translateY(-50%) translateY(-20px) !important;
        }

        /* 4. CONTENEDOR DEL ÁRBOL ANIMADO */
        #garden {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            left: 0;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        /* Lienzo invisible sobre el que JavaScript dibuja */
        canvas {
            display: block;
        }

    </style>
</head>
<body>

    <div class="background"></div>
    <div class="moon"></div>
    
    <div id="main-message">Para la niña más linda, para Nat <3</div>
    
    <div id="garden"></div>

    <script>
        // --- 1. Generar Estrellas Pro ---
        const starsContainer = document.querySelector('body');
        for (let i = 0; i < 70; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 80 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // --- 2. Preparar el Lienzo para la Animación ---
        const garden = document.getElementById('garden');
        const canvas = document.createElement('canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        garden.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        // --- 3. El Motor del Árbol Animado (Recursivo) ---
        function drawBranch(startX, startY, len, angle, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = '#4d2a00'; // Marrón tronco
            ctx.lineWidth = branchWidth;
            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            // Si la rama es muy fina, dibuja flores amarillas detalladas
            if (len < 10) {
                drawFlowerDetail(0, -len);
                ctx.restore();
                return;
            }

            // Ramificaciones
            drawBranch(0, -len, len * 0.75, angle - 18, branchWidth * 0.7);
            drawBranch(0, -len, len * 0.75, angle + 18, branchWidth * 0.7);

            ctx.restore();
        }

        // --- 4. NUEVO DISEÑO DE FLORES DETALLADAS (No más pelotas) ---
        function drawFlowerDetail(x, y) {
            ctx.save();
            ctx.translate(x, y);

            // Resplandor dorado Pro
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffd700';

            // Dibujar pétalos amarillos ovalados
            ctx.fillStyle = '#ffd700'; 
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                ctx.ellipse(0, -5, 5, 12, 0, 0, Math.PI * 2);
                ctx.rotate((360 / 5) * Math.PI / 180);
            }
            ctx.fill();

            // Centro ámbar detallado
            ctx.fillStyle = '#3d2000'; 
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // --- 5. La Animación Secuencial ---
        let currentLen = 0;
        const targetLen = 80; // Altura final del tronco

        function animateTree() {
            // Limpiar lienzo en cada frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Crecer tronco base
            if (currentLen < targetLen) {
                currentLen += 1;
            }

            // Iniciar recursividad con la longitud actual
            // Ajustar posición base centrada
            drawBranch(canvas.width / 2, canvas.height, currentLen, 0, 15);

            // Seguir animando hasta que llegue al tamaño final
            if (currentLen < targetLen) {
                requestAnimationFrame(animateTree);
            } else {
                // Cuando el árbol termine de crecer, mostrar el mensaje final
                setTimeout(() => {
                    document.getElementById('main-message').classList.add('show-main-message');
                }, 1000); 
            }
        }

        // --- 6. Iniciar Todo ---
        animateTree();

        // Reajustar tamaño si cambia la pantalla
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            animateTree();
        });
    </script>
</body>
</html>

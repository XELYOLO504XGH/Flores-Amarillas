<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat <3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b001a;
            font-family: 'Verdana', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0b001a 0%, #1e003d 50%, #3d007a 100%);
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .moon {
            position: absolute;
            top: 50px;
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.3);
            z-index: 1;
        }

        #initial-text {
            position: absolute;
            top: calc(50% - 160px);
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            z-index: 20;
        }

        #main-message {
            position: absolute;
            top: 40%;
            width: 90%;
            text-align: center;
            color: #ffd700;
            font-size: 1.8rem;
            font-style: italic;
            z-index: 10;
            opacity: 0;
            text-shadow: 0 0 15px #ffd700;
            transition: opacity 2s;
            pointer-events: none;
        }

        #big-flower-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            z-index: 25;
            cursor: pointer;
        }

        .big-petal {
            position: absolute;
            background: #ffd700;
            width: 50px;
            height: 80px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform-origin: center bottom;
            box-shadow: 0 0 20px #ffd700;
        }

        .big-center {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #634000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        canvas {
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 5;
            pointer-events: none;
        }

        .hide { display: none !important; }
        .show-msg { opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="moon"></div>
    
    <div id="initial-text">espero que te guste</div>
    
    <div id="big-flower-container">
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(0deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(72deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(144deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(216deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(288deg);"></div>
        <div class="big-center"></div>
    </div>

    <div id="main-message">Para la niña más linda, para Nat <3</div>
    <canvas id="treeCanvas"></canvas>

    <script>
        // Estrellas
        for (let i = 0; i < 75; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const s = Math.random() * 2 + 1;
            star.style.width = s + 'px'; star.style.height = s + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 75 + '%';
            document.body.appendChild(star);
        }

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawFlower(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#ffd700'; // Amarillo sin brillo
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(0, -5, 3, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.rotate((Math.PI * 2) / 5);
            }
            ctx.fillStyle = '#4d2a00';
            ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        // Función simple de dibujo paso a paso
        function drawTreeStep(x, y, len, angle, width) {
            if (len < 5) {
                drawFlower(x, y);
                return;
            }

            const x2 = x + Math.sin(angle * Math.PI / 180) * len;
            const y2 = y - Math.cos(angle * Math.PI / 180) * len;

            ctx.beginPath();
            ctx.strokeStyle = '#4d2a00';
            ctx.lineWidth = width;
            ctx.moveTo(x, y);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // Animación: Espera un poquito antes de dibujar las siguientes ramas
            setTimeout(() => {
                drawTreeStep(x2, y2, len * 0.8, angle - 25, width * 0.7);
                drawTreeStep(x2, y2, len * 0.8, angle + 25, width * 0.7);
            }, 150);
        }

        document.getElementById('big-flower-container').addEventListener('click', function() {
            this.classList.add('hide');
            document.getElementById('initial-text').classList.add('hide');
            
            // Inicia el dibujo desde el centro inferior
            drawTreeStep(canvas.width / 2, canvas.height, 80, 0, 10);

            // Mensaje final
            setTimeout(() => {
                document.getElementById('main-message').classList.add('show-msg');
            }, 3500);
        });
    </script>
</body>
</html>

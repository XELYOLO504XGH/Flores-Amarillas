<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat <3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #05001a 0%, #1a0033 60%, #4b0082 100%);
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Alinear flores abajo */
            perspective: 1000px; /* Para efecto 3D leve */
        }

        /* La Luna */
        .moon {
            position: absolute;
            top: 5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px 15px rgba(255, 255, 255, 0.4);
            z-index: 1;
        }

        /* Estrellas */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.7; }
        }

        /* Cuadro de Texto */
        #text-box {
            position: absolute;
            top: 22vh;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 28px;
            background: rgba(255, 255, 255, 0.08); /* Fondo cristal */
            backdrop-filter: blur(8px); /* Desenfoque moderno */
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffd700; /* Texto dorado */
            font-family: 'Verdana', sans-serif;
            font-size: 1.6em;
            font-weight: bold;
            text-align: center;
            opacity: 0; /* Empieza oculto */
            z-index: 4;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); /* Resplandor dorado */
        }

        .text-fade-active {
            animation: textFade 1.5s forwards ease-out 4s; /* Aparece después de las flores */
        }

        @keyframes textFade {
            0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            100% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Contenedor del Ramo */
        .bouquet-container {
            position: relative;
            margin-bottom: 20vh; /* Ajuste altura flores */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 3;
        }

        /* Estructura del Tulipán CSS */
        .tulip-css {
            position: relative;
            width: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            opacity: 0;
            animation: growIn 1.8s forwards ease-out;
        }

        @keyframes growIn {
            0% { transform: scale(0.1) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .stem {
            width: 5px;
            background: #2d5a27;
            border-radius: 3px;
        }

        /* Cabeza del Tulipán (los pétalos) */
        .flower-head {
            position: relative;
            width: 30px;
            height: 45px;
            margin-bottom: -5px; /* Superponer un poco al tallo */
        }

        .petal {
            position: absolute;
            background: #ffd700;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%; /* Forma ovalada */
            width: 30px;
            height: 45px;
            transform-origin: bottom center;
            border: 1px solid rgba(181, 148, 16, 0.3); /* Borde suave dorado */
        }

        /* Pétalos traseros fijos */
        .p-center-back { background: #f5cc00; z-index: 1; }
        
        /* Pétalos que se abren */
        .p-left-open { 
            animation: openPetalLeft 1.2s forwards ease-out 2.5s; 
            z-index: 2;
        }
        .p-right-open { 
            animation: openPetalRight 1.2s forwards ease-out 2.5s; 
            z-index: 2;
        }

        @keyframes openPetalLeft {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-18deg) translateX(-8px); }
        }

        @keyframes openPetalRight {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(18deg) translateX(8px); }
        }

    </style>
</head>
<body>

    <div class="stars" id="stars-container"></div>
    <div class="moon"></div>
    
    <div id="text-box" class="text-fade-active">
        para nat <#
    </div>

    <div class="bouquet-container">
        <div class="tulip-css" style="margin-right: -15px; animation-delay: 0.2s;">
            <div class="flower-head">
                <div class="petal p-left-open"></div>
                <div class="petal p-right-open"></div>
                <div class="petal p-center-back"></div>
            </div>
            <div class="stem" style="height: 120px;"></div>
        </div>

        <div class="tulip-css" style="z-index: 5; animation-delay: 0.5s;">
            <div class="flower-head" style="width: 35px; height: 50px;">
                <div class="petal p-left-open" style="width: 35px; height: 50px;"></div>
                <div class="petal p-right-open" style="width: 35px; height: 50px;"></div>
                <div class="petal p-center-back" style="width: 35px; height: 50px; background: #ffd700;"></div>
            </div>
            <div class="stem" style="height: 150px; background: #356b2e;"></div>
        </div>

        <div class="tulip-css" style="margin-left: -15px; animation-delay: 0.8s;">
            <div class="flower-head">
                <div class="petal p-left-open"></div>
                <div class="petal p-right-open"></div>
                <div class="petal p-center-back"></div>
            </div>
            <div class="stem" style="height: 120px;"></div>
        </div>
    </div>

    <script>
        // Generar estrellas aleatorias
        const container = document.getElementById('stars-container');
        const numStars = 70;

        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            // Tamaño aleatorio (1px a 3px)
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            
            // Posición aleatoria
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 80 + '%'; // Más estrellas arriba
            
            // Retraso de animación aleatorio para el parpadeo
            star.style.animationDelay = Math.random() * 3 + 's';
            
            container.appendChild(star);
        }
    </script>
</body>
</html>

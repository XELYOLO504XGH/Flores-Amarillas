<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #1a0033, #4b0082);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* La Luna */
        .moon {
            position: absolute;
            top: 50px;
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 40px #fff;
        }

        /* El Valle */
        .valley {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 35vh;
            background: #300050;
            border-top-left-radius: 50% 15%;
            border-top-right-radius: 50% 15%;
            z-index: 1;
        }

        /* Contenedor del Ramo */
        .bouquet {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 20px;
            transform: translateY(100px);
        }

        /* Estructura del Tulipán */
        .tulip {
            position: relative;
            animation: grow 2s ease-out forwards;
        }

        .stem {
            width: 6px;
            height: 120px;
            background: #2d5a27;
            border-radius: 4px;
        }

        .flower-head {
            position: absolute;
            top: -35px;
            left: -12px;
            width: 30px;
            height: 40px;
        }

        .petal {
            position: absolute;
            width: 30px;
            height: 45px;
            background: #ffcc00;
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: bottom center;
            border: 1px solid #e6b800;
        }

        /* Animaciones de los Pétalos */
        .p-left { animation: openLeft 1.5s 1.5s forwards; }
        .p-right { animation: openRight 1.5s 1.5s forwards; }
        .p-center { z-index: 2; }

        @keyframes grow {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes openLeft {
            100% { transform: rotate(-30deg) translateX(-10px); }
        }

        @keyframes openRight {
            100% { transform: rotate(30deg) translateX(10px); }
        }

        /* Cuadro de Texto */
        .message {
            position: absolute;
            top: 180px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            padding: 15px 30px;
            border-radius: 20px;
            color: #ffcc00;
            font-size: 1.8rem;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            animation: fadeIn 2s 3s forwards;
            z-index: 3;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn {
            100% { opacity: 1; transform: translateY(-20px); }
        }

        /* Estrellas/Flores moradas fondo */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .star {
            position: absolute;
            background: #9370DB;
            border-radius: 50%;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>
    <div class="moon"></div>
    <div class="message">Para Nat <3</div>

    <div class="bouquet">
        <div class="tulip">
            <div class="flower-head">
                <div class="petal p-left"></div>
                <div class="petal p-right"></div>
                <div class="petal p-center"></div>
            </div>
            <div class="stem"></div>
        </div>
        <div class="tulip" style="animation-delay: 0.5s;">

                <div class="petal p-left" style="animation-delay: 2s;"></div>

                <div class="petal p-center"></div>
            </div>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la niña mas linda, para Nat</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b001a;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Fondo Morado Gradiente */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0b001a 0%, #1e003d 50%, #3d007a 100%);
            z-index: 0;
        }

        /* Luna */
        .moon {
            position: absolute;
            top: 60px;
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.2);
            z-index: 1;
        }

        /* Estrellas */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Texto */
        .message {
            position: absolute;
            top: 220px;
            width: 80%;
            text-align: center;
            color: #ffd700;
            font-family: 'Times New Roman', serif;
            font-size: 1.4rem;
            font-style: italic;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 3s forwards;
            animation-delay: 5s;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Contenedor de Flores */
        #garden {
            position: relative;
            width: 100%;
            height: 300px;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* Flor Estilo TikTok */
        .flower {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: bottom center;
            animation: grow 3s ease-out forwards;
        }

        .stem {
            width: 2px;
            height: 0; /* Empieza en 0 */
            background: #2d5a27;
            animation: stemGrow 3s ease-out forwards;
        }

        .flower-top {
            position: relative;
            width: 20px;
            height: 20px;
            opacity: 0;
            animation: bloom 1s ease-out forwards;
            animation-delay: 2.5s;
        }

        .petal {
            position: absolute;
            background: #ffd700;
            width: 12px;
            height: 18px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform-origin: center bottom;
        }

        .center {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #634000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        /* Animaciones */
        @keyframes stemGrow {
            to { height: var(--h); }
        }

        @keyframes bloom {
            to { opacity: 1; transform: scale(1.2); }
        }

        @keyframes grow {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="background"></div>
    <div class="moon"></div>
    <div class="message">Para la niña más linda, para Nat </div>
    
    <div id="garden"></div>

    <script>
        // Crear Estrellas
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 70 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }

        // Crear Flores
        const garden = document.getElementById('garden');
        const numFlowers = 45; // Cantidad justa para que se vea estético

        for (let i = 0; i < numFlowers; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            
            // Variación de altura y posición
            const height = Math.random() * 150 + 80;
            flower.style.left = Math.random() * 100 + '%';
            flower.style.setProperty('--h', height + 'px');
            flower.style.animationDelay = (Math.random() * 3) + 's';

            // Parte de arriba de la flor
            const top = document.createElement('div');
            top.className = 'flower-top';
            top.style.animationDelay = (parseFloat(flower.style.animationDelay) + 2) + 's';

            // Pétalos (6 pétalos por flor)
            for (let j = 0; j < 6; j++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.transform = `translate(-50%, -100%) rotate(${j * 60}deg)`;
                top.appendChild(petal);
            }

            const center = document.createElement('div');
            center.className = 'center';
            top.appendChild(center);

            const stem = document.createElement('div');
            stem.className = 'stem';
            stem.style.animationDelay = flower.style.animationDelay;

            flower.appendChild(top);
            flower.appendChild(stem);
            garden.appendChild(flower);
        }
    </script>
</body>
</html>

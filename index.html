
 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat <3</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b001a;
            font-family: 'Verdana', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0b001a 0%, #1e003d 50%, #3d007a 100%);
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .moon {
            position: absolute;
            top: 50px;
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.3);
            z-index: 1;
        }

        #initial-text {
            position: absolute;
            top: calc(50% - 160px);
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            z-index: 20;
        }

        #main-message {
            position: absolute;
            top: 40%;
            width: 90%;
            text-align: center;
            color: #ffd700;
            font-size: 1.8rem;
            font-style: italic;
            z-index: 10;
            opacity: 0;
            text-shadow: 0 0 15px #ffd700;
            transition: opacity 2s;
            pointer-events: none;
        }

        #big-flower-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            z-index: 25;
            cursor: pointer;
        }

        .big-petal {
            position: absolute;
            background: #ffd700;
            width: 50px;
            height: 80px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform-origin: center bottom;
            box-shadow: 0 0 20px #ffd700;
        }

        .big-center {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #634000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        #garden {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            z-index: 5;
            pointer-events: none;
        }

        .hide { display: none !important; }
        .show-msg { opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="moon"></div>
    
    <div id="initial-text">espero que te guste</div>
    
    <div id="big-flower-container">
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(0deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(72deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(144deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(216deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(288deg);"></div>
        <div class="big-center"></div>
    </div>

    <div id="main-message">Para la niña más linda, para Nat <3</div>
    <div id="garden"></div>

    <script>
        // Estrellas
        for (let i = 0; i < 75; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const s = Math.random() * 2 + 1;
            star.style.width = s + 'px'; star.style.height = s + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 75 + '%';
            document.body.appendChild(star);
        }

        const canvas = document.createElement('canvas');
        document.getElementById('garden').appendChild(canvas);
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function drawFlower(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#ffd700';
            // Pétalos definidos
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(0, -5, 3.5, 9, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.rotate((Math.PI * 2) / 5);
            }
            // Centro de la flor
            ctx.fillStyle = '#4d2a00';
            ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawTree(x, y, len, angle, width) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = '#4d2a00';
            ctx.lineWidth = width;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 10) {
                drawFlower(0, -len);
                ctx.restore();
                return;
            }

            // Animación controlada por requestAnimationFrame para suavidad
            requestAnimationFrame(() => {
                drawTree(0, -len, len * 0.8, angle - 22, width * 0.7);
                drawTree(0, -len, len * 0.8, angle + 22, width * 0.7);
            });

            ctx.restore();
        }

        document.getElementById('big-flower-container').addEventListener('click', function() {
            this.classList.add('hide');
            document.getElementById('initial-text').classList.add('hide');
            
            // Inicia el dibujo del árbol animado
            drawTree(canvas.width / 2, canvas.height, 80, 0, 12);

            // Muestra el mensaje después de que crezca un poco
            setTimeout(() => {
                document.getElementById('main-message').classList.add('show-msg');
            }, 2500);
        });
    </script>
</body>
</html>

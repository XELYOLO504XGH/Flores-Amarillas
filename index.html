<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #0b001a;
            font-family: 'Verdana', sans-serif;
        }

        .background-gradient {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #0b001a 0%, #1e003d 50%, #3d007a 100%);
            z-index: 0;
        }

        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .moon-container {
            position: absolute; top: 50px; width: 110px; height: 110px;
            z-index: 1; box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.3);
            border-radius: 50%; overflow: hidden; left: 50%; transform: translateX(-50%);
        }

        .moon-image {
            width: 100%; height: 100%;
            background-image: url('luna.png');
            background-size: cover; background-position: center;
        }

        #initial-text {
            position: absolute; top: calc(50% - 160px); width: 100%;
            text-align: center; color: #ffd700; font-size: 1.2rem;
            font-weight: bold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            z-index: 20;
        }

        #main-message {
            position: absolute; top: 35%; width: 100%;
            text-align: center; color: #ffd700; font-size: 1.8rem;
            font-style: italic; z-index: 10; opacity: 0;
            text-shadow: 0 0 15px #ffd700; transition: opacity 2s;
        }

        #big-flower-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 150px; height: 150px;
            z-index: 25; cursor: pointer;
            background-image: url('flor_amarilla.png');
            background-size: cover; border-radius: 50%;
            box-shadow: 0 0 30px #ffd700;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none; }

        .sakura-petal {
            position: absolute; 
            background-image: url('flor_rosada.png');
            background-size: cover; z-index: 6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        .hide { display: none !important; }
        .show-msg { opacity: 1 !important; }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="moon-container"><div class="moon-image"></div></div>
    <div id="initial-text">espero que te guste</div>
    <div id="big-flower-container"></div>
    <div id="main-message">Para la niña más linda, para Nat <3</div>
    <canvas id="treeCanvas"></canvas>

    <script>
        // Estrellas
        for (let i = 0; i < 75; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const s = Math.random() * 2 + 1;
            star.style.width = s + 'px'; star.style.height = s + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 75 + '%';
            document.body.appendChild(star);
        }

        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const imgAmarilla = new Image(); imgAmarilla.src = 'flor_amarilla.png';
        const imgRosada = new Image(); imgRosada.src = 'flor_rosada.png';

        // FUNCIÓN DE DIBUJO CORREGIDA
        function drawTree(x, y, len, angle, width) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = '#4d2a00';
            ctx.lineWidth = width;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            // Guardamos la posición actual de la punta de la rama
            const endX = 0;
            const endY = -len;

            if (len < 10) {
                // Dibujamos la flor JUSTO en la punta de la rama actual
                ctx.drawImage(imgAmarilla, -12, endY - 12, 24, 24);
                ctx.restore();
                return;
            }

            // Animación: las ramas salen de la punta (0, -len)
            setTimeout(() => {
                drawTree(endX, endY, len * 0.8, angle - 22, width * 0.7);
                drawTree(endX, endY, len * 0.8, angle + 22, width * 0.7);
            }, 100);

            ctx.restore();
        }

        function createSakuraShower() {
            for (let i = 0; i < 40; i++) {
                const petal = document.createElement('div');
                petal.className = 'sakura-petal';
                const size = Math.random() * 12 + 8;
                petal.style.width = size + 'px'; petal.style.height = size + 'px';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
                petal.style.animationDelay = (Math.random() * 10) + 's';
                document.body.appendChild(petal);
            }
        }

        document.getElementById('big-flower-container').addEventListener('click', function() {
            this.classList.add('hide');
            document.getElementById('initial-text').classList.add('hide');
            
            // Dibujamos el árbol desde el fondo centro
            drawTree(canvas.width / 2, canvas.height, 85, 0, 12);
            
            createSakuraShower();
            
            setTimeout(() => { 
                document.getElementById('main-message').classList.add('show-msg'); 
            }, 3500);
        });
    </script>
</body>
</html>

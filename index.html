
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Nat <3</title>
    <style>
        /* 1. FONDO Y ESCENA GENERAL */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b001a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Verdana', sans-serif;
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0b001a 0%, #1e003d 50%, #3d007a 100%);
            z-index: 0;
        }

        /* 2. ESTRELLAS Y LUNA */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .moon {
            position: absolute;
            top: 50px;
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 255, 255, 0.3);
            z-index: 1;
        }

        /* 3. TEXTOS CON BRILLO */
        #initial-text {
            position: absolute;
            top: calc(50% - 160px);
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            z-index: 10;
            transition: opacity 1s;
        }

        #main-message {
            position: absolute;
            top: 150px;
            width: 90%;
            text-align: center;
            color: #ffd700;
            font-size: 1.5rem;
            font-style: italic;
            z-index: 10;
            opacity: 0;
            text-shadow: 0 0 15px #ffd700, 0 0 30px #ffcc00;
            transition: opacity 2s, transform 2s;
            pointer-events: none;
        }

        .show-main-message {
            opacity: 1 !important;
            transform: translateY(-20px);
        }

        /* 4. FLOR GRANDE (EL BOTÓN) */
        #big-flower-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            z-index: 15;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        .big-petal {
            position: absolute;
            background: #ffd700;
            width: 50px;
            height: 80px;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform-origin: center bottom;
            box-shadow: 0 0 20px #ffd700;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .big-center {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #634000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* 5. CONTENEDOR DEL JARDÍN/ÁRBOL */
        #garden {
            position: absolute;
            width: 100%;
            height: 100%;
            bottom: 0;
            left: 0;
            z-index: 5;
            pointer-events: none;
        }

        .hide-element {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="moon"></div>
    
    <div id="initial-text">espero que te guste</div>
    <div id="main-message">Para la niña más linda, para Nat <3</div>
    
    <div id="big-flower-container">
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(0deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(72deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(144deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(216deg);"></div>
        <div class="big-petal" style="transform: translate(-50%, -100%) rotate(288deg);"></div>
        <div class="big-center"></div>
    </div>

    <div id="garden"></div>

    <script>
        // --- 1. Generar Estrellas ---
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 80 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(star);
        }

        // --- 2. Referencias ---
        const bigFlower = document.getElementById('big-flower-container');
        const initialText = document.getElementById('initial-text');
        const mainMessage = document.getElementById('main-message');
        const garden = document.getElementById('garden');

        // --- 3. Lógica del Árbol de Corazón (Recursivo) ---
        function createTree() {
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.position = 'absolute';
            canvas.style.bottom = '0';
            garden.appendChild(canvas);
            const ctx = canvas.getContext('2d');

            function drawBranch(x, y, len, angle, width) {
                ctx.beginPath();
                ctx.save();
                ctx.strokeStyle = '#4d2a00';
                ctx.lineWidth = width;
                ctx.translate(x, y);
                ctx.rotate(angle * Math.PI / 180);
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -len);
                ctx.stroke();

                if (len < 10) {
                    // Dibujar flores amarillas en las puntas (estilo video)
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ffd700";
                    ctx.beginPath();
                    ctx.arc(0, -len, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                    return;
                }

                // Crea la forma de corazón con los ángulos
                drawBranch(0, -len, len * 0.8, angle - 18, width * 0.7);
                drawBranch(0, -len, len * 0.8, angle + 18, width * 0.7);
                
                ctx.restore();
            }

            // Dibujar el árbol centrado
            drawBranch(canvas.width / 2, canvas.height, 80, 0, 12);
        }

        // --- 4. El Evento del Clic ---
        bigFlower.addEventListener('click', () => {
            // Ocultar inicio
            bigFlower.classList.add('hide-element');
            initialText.classList.add('hide-element');
            
            // Mostrar mensaje final
            mainMessage.classList.add('show-main-message');
            
            // Iniciar el árbol
            createTree();
        });
    </script>
</body>
</html>
